name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloud Run Staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/agent-sec-496307/agentsec/backend:latest ./backend

      - name: Push image to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/agent-sec-496307/agentsec/backend:latest

      - name: Deploy to Cloud Run staging
        run: |
          gcloud run deploy agentsec-staging \
            --image us-central1-docker.pkg.dev/agent-sec-496307/agentsec/backend:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --project agent-sec-496307

      - name: Slack — Deploy Success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{"text":"Deploy SUCCESS on ${{ github.repository }} commit ${{ github.sha }} — https://agentsec-staging-468774339170.us-central1.run.app"}'

      - name: Slack — Deploy Failed
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{"text":"Deploy FAILED on ${{ github.repository }} commit ${{ github.sha }} — check GitHub Actions logs"}'
