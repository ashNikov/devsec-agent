---
- name: Configure AgentSec secrets from GCP Secret Manager
  hosts: agentsec
  gather_facts: true

  vars:
    project_id: "agent-sec-496307"
    backend_dir: "{{ ansible_env.HOME }}/projects/devsec-agent/backend"

  tasks:
    - name: Verify gcloud is authenticated
      command: gcloud auth list --filter=status:ACTIVE --format="value(account)"
      register: gcloud_account
      changed_when: false

    - name: Print active GCP account
      debug:
        msg: "Active GCP account: {{ gcloud_account.stdout }}"

    - name: Fetch GitHub OAuth Client ID from Secret Manager
      command: >
        gcloud secrets versions access latest
        --secret=github-oauth-client-id
        --project={{ project_id }}
      register: github_client_id
      changed_when: false
      no_log: true

    - name: Fetch GitHub OAuth Client Secret from Secret Manager
      command: >
        gcloud secrets versions access latest
        --secret=github-oauth-client-secret
        --project={{ project_id }}
      register: github_client_secret
      changed_when: false
      no_log: true

    - name: Confirm secrets were fetched successfully
      debug:
        msg: "✅ GitHub OAuth secrets fetched from GCP Secret Manager successfully"

    - name: Write runtime OAuth config for backend
      copy:
        dest: "{{ backend_dir }}/.oauth_env"
        content: |
          GITHUB_CLIENT_ID={{ github_client_id.stdout }}
          GITHUB_CLIENT_SECRET={{ github_client_secret.stdout }}
          OAUTH_REDIRECT_URI=http://localhost:8000/auth/callback
          FRONTEND_URL=http://localhost:3000
        mode: '0600'

    - name: Confirm OAuth config written
      debug:
        msg: "✅ OAuth runtime config written to backend — secrets never touched .env"
